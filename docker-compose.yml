services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    
    ports:
      - "3001:3000"

    environment:
      POSTGRES_DATABASE: analytics-db
      POSTGRES_USERNAME: analytics-user
      POSTGRES_PASSWORD: analytics-password
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_URL: postgres://analytics-user:analytics-password@db:5432/analytics-db

  db:
    image: postgres:alpine
    restart: always
    environment:
      POSTGRES_USER: analytics-user
      POSTGRES_PASSWORD: analytics-password
      POSTGRES_DB: analytics-db

    healthcheck:
      test: pg_isready -U analytics-user -d analytics-db
      interval: 2s
      timeout: 3s
      retries: 40

    volumes:
      - analytics-db-data:/var/lib/postgresql/data/

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    depends_on:
      - api

volumes:
  analytics-db-data:
    name: analytics-db-data
